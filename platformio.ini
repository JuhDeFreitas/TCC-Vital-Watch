; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32-s2-saola-1

[env:esp32-s2-saola-1]
platform = espressif32
board = esp32-s2-saola-1
framework = espidf
monitor_speed = 115200

; ── Testes unitários nativos (rodam no PC, sem hardware) ────────────────────
; Execução: pio test -e native
; Testa todas as funções matemáticas de algorithm.c
[env:native]
platform = native
build_src_filter = -<*>
build_flags = -std=c99 -D_USE_MATH_DEFINES -lm -DUNITY_SUPPORT_64 -I src/max30102
test_filter = test_algorithm

; ── Testes de integração embarcados (requerem ESP32 + MAX30102) ─────────────
; Execução: pio test -e esp32-s2-sensor-test
; Testa I2C, registradores, FIFO e temperatura do sensor
[env:esp32-s2-sensor-test]
platform = espressif32
board = esp32-s2-saola-1
framework = espidf
monitor_speed = 115200
build_src_filter = +<*> -<main.c>
test_filter = test_sensor
